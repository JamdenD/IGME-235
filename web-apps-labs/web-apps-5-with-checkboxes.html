<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>Web Apps-5</title>
	<style>
		body{
			font-family:sans-serif;
		}
		#colorform{
			background-color:#dfecdf;
			color: #111;
			padding:1em;width:400px;
		}
		#colorform p#info{
			background-color:white;
			color: black;
			width:300px;
			height:100px;
			padding:.5em;
		}
		
		#colorform legend{ 
			font-weight:bold;
			font-size:1.2em;
		}
	</style>
</head>
<body>

<div id="colorform">
	<legend>Choose your favorite color!</legend>
	<p><input type="checkbox" name="colorGroup" id="colorGroupRed" value="red" /> Red</p>
	<p><input type="checkbox" name="colorGroup" id="colorGroupGreen" value="green" /> Green</p>
	<p><input type="checkbox" name="colorGroup" id="colorGroupBlue" value="blue" /> Blue</p>
	<p><button id="colorButton" type="button">Submit</button></p>
	<p id="info"></p>
</div>

<script>
let info = document.querySelector("#info");
let legend = document.querySelector("legend");
let submit = document.querySelector("#colorButton");

/* Write your code here! */
let redText = () => {info.innerHTML = "You have selected red!";};
let greenText = () => {info.innerHTML = "You have selected green!";};
let blueText = () => {info.innerHTML = "You have selected blue!";};

let red = document.querySelector("#colorGroupRed");
let green = document.querySelector("#colorGroupGreen");
let blue = document.querySelector("#colorGroupBlue");

document.querySelectorAll("input[name = 'colorGroup']").forEach(input => {
	input.addEventListener("change", () => {
		let selected = document.querySelectorAll("input[name='colorGroup']:checked");
		
		let colors = [];
		selected.forEach(box => colors.push(box.value));

        info.innerHTML = colors.length ? `You have selected ${colors.join(" and ")}!`: "";
	});
});

submit.addEventListener("click", () => {
	let checkboxes = document.querySelectorAll("input[name='colorGroup']");
	let selectedColors = [];

checkboxes.forEach(box => {
	if(box.checked) {
		selectedColors.push(box.value);
	}
});

if (selectedColors.length > 0) {
	info.innerHTML = `Your FINAL CHOICE is ${selectedColors.join(" and ")}!`;
}

});

</script>
</body>
</html>
